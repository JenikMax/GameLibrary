<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <base href="/game-library/" />
    <link rel="icon" type="image/png" href="/game-library/img/app_ico.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Library</title>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (!theme) {
            var oldDark = localStorage.getItem('darkMode');
            if (oldDark === 'true') { theme = 'default-dark'; }
            else if (oldDark === 'false') { theme = 'default-light'; }
            else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) { theme = 'default-dark'; }
            else { theme = 'default-light'; }
            localStorage.setItem('theme', theme);
            localStorage.removeItem('darkMode');
          }
          document.documentElement.setAttribute('data-theme', theme);
          var isDark = theme === 'default-dark' || theme === 'retro-terminal';
          document.documentElement.setAttribute('data-color-scheme', isDark ? 'dark' : 'light');
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';

          var lang = localStorage.getItem('locale');
          if (lang) {
            document.documentElement.lang = lang;
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
