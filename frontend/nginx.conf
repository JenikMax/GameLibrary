# ─── HTTP server (для разработки, без HTTPS) ─────────────────
server {
    listen 80;
    server_name localhost;

    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect root to SPA base path
    location = / {
        return 301 /game-library/;
    }

    # Serve built assets at /game-library/assets/
    location /game-library/assets/ {
        alias /usr/share/nginx/html/assets/;
    }

    # Vue SPA - serve index.html for all /game-library routes
    location /game-library {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /game-library/api/ {
        client_max_body_size 50M;
        proxy_pass http://backend:8080;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Static resources from backend (legacy Thymeleaf pages)
    location /game-library/css/ { proxy_pass http://backend:8080; }
    location /game-library/js/ { proxy_pass http://backend:8080; }
    location /game-library/img/ { proxy_pass http://backend:8080; }
    location /game-library/resources/ { proxy_pass http://backend:8080; }

    # Swagger
    location /game-library/swagger-ui/ { proxy_pass http://backend:8080; }
    location /game-library/v3/ { proxy_pass http://backend:8080; }
    location /game-library/swagger-ui.html { proxy_pass http://backend:8080; }
}
