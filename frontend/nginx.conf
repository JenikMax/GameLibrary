server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Vue SPA - serve index.html for all /game-library routes
    location /game-library {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /game-library/api/ {
        client_max_body_size 50M;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large file downloads (ZIP, torrent)
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Static resources from backend (legacy Thymeleaf pages still need these)
    location /game-library/css/ {
        proxy_pass http://backend:8080;
    }
    location /game-library/js/ {
        proxy_pass http://backend:8080;
    }
    location /game-library/img/ {
        proxy_pass http://backend:8080;
    }
    location /game-library/resources/ {
        proxy_pass http://backend:8080;
    }

    # Swagger
    location /game-library/swagger-ui/ {
        proxy_pass http://backend:8080;
    }
    location /game-library/v3/ {
        proxy_pass http://backend:8080;
    }
    location /game-library/swagger-ui.html {
        proxy_pass http://backend:8080;
    }
}
