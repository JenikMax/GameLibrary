server:
  max-http-header-size: 50000KB
  tomcat:
    max-http-form-post-size: 100000KB
    max-file-size: 100000KB
    max-request-size: 100000KB
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /game-library

game-library:
  games:
    directory: ${GAMES_DIRECTORY:/gameLibrary}
    torrent:
      directory-tmp: ${TORRENT_DIR_TMP:/torrentDirTmp}
  images:
    directory: ${IMAGES_DIRECTORY:/gameLibrary/images}
  jwt:
    secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  aria2:
    rpc-url: ${ARIA2_RPC_URL:http://aria2:6800/jsonrpc}
    rpc-secret: ${ARIA2_RPC_SECRET:}
    download-dir: ${ARIA2_DOWNLOAD_DIR:/downloads}

spring:
  mvc:
    async:
      request-timeout: 7680000
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/game-library?currentSchema=library
    username: library-manager-user
    password: 2wq345tgfiNcbBBwee3
  jpa:
    properties:
      hibernate.default_schema: library
    hibernate:
      default_schema: library

entitymanager:
  packages:
    to:
      scan: com.jenikmax.game.library.model.entity
