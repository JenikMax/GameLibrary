server:
  max-http-header-size: 16KB
  tomcat:
    max-http-form-post-size: 100MB
    threads:
      max: 10
      min-spare: 2
    accept-count: 5
    connection-timeout: 30000
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /game-library

spring:
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  mvc:
    async:
      request-timeout: 600000
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/game-library?currentSchema=library
    username: library-manager-user
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      connection-timeout: 10000
      connection-test-query: SELECT 1
  jpa:
    properties:
      hibernate.default_schema: library
      hibernate.default_batch_fetch_size: 10
      hibernate.jdbc.fetch_size: 100
      hibernate.jdbc.batch_size: 20
      hibernate.order_inserts: true
      hibernate.order_updates: true
    hibernate:
      default_schema: library

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    doc-expansion: list
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

game-library:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  games:
    directory: ${GAMES_DIRECTORY:/gameLibrary}
    torrent:
      directory-tmp: ${TORRENT_DIR_TMP:/torrentDirTmp}
  images:
    directory: ${IMAGES_DIRECTORY:/gameLibrary/images}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  tracker:
    announce-base-url: ${TRACKER_ANNOUNCE_URL:http://localhost:8080/game-library/api/tracker/announce}
  transmission:
    rpc-url: ${TRANSMISSION_RPC_URL:http://transmission:9091/transmission/rpc}
    download-dir: ${TRANSMISSION_DOWNLOAD_DIR:/downloads}
  scraper:
    config-dir: ${SCRAPER_CONFIG_DIR:/gameLibrary/gameLibraryConfigs/scrapers}
