services:
  postgresdb:
    build:
      context: .
      dockerfile: ./postgresdb/Dockerfile
    ports:
      - "5432:5432"
    volumes:
      # Данные PostgreSQL (БД). Хранятся между перезапусками контейнера.
      - /host_mnt/d/Work/MyProjects/gametest/gameLibraryConfigs/db/data:/var/lib/postgresql/data
      #- /host_mnt/f/Work/Git/my_project/db/data:/var/lib/postgresql/data  #рабочий пример
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    mem_limit: 512m

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_HOST=postgresdb
      - DB_PORT=5432
      # ⚠️ TRACKER_ANNOUNCE_URL — IP машины, на которой запущен backend (трекер).
      # Должен быть доступен из ваших торрент-клиентов. Замените на актуальный IP:
      #   docker-compose:  http://<IP_ХОСТА>:8080/game-library/api/tracker/announce
      #   без Docker:      http://localhost:8080/game-library/api/tracker/announce
      - TRACKER_ANNOUNCE_URL=http://localhost:8080/game-library/api/tracker/announce
      - TRANSMISSION_RPC_URL=http://transmission:9091/transmission/rpc
      - TRANSMISSION_DOWNLOAD_DIR=/downloads
      - GAMES_DIRECTORY=/gameLibrary
      - IMAGES_DIRECTORY=/gameLibrary/images
      - SCRAPER_CONFIG_DIR=/scraper-config
      - JWT_SECRET=${JWT_SECRET}
      # ⚠️ SCRAPER_ENCRYPTION_KEY — ключ шифрования API-ключей скраперов.
      # Если измените — пересохраните API-ключи в админке (/admin/scrapers).
      # Сгенерировать новый: openssl rand -base64 32
      - SCRAPER_ENCRYPTION_KEY=${SCRAPER_ENCRYPTION_KEY}
      - DB_PASSWORD=${DB_PASSWORD}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - TTORRENT_HASHING_THREADS=2
    volumes:
      # Корень библиотеки игр. Внутри контейнера: games/ (файлы игр), images/ (скриншоты, обложки).
      - /host_mnt/d/Work/MyProjects/gametest:/gameLibrary
      #- /host_mnt/f/Work/Git/my_project/data:/gameLibrary  #рабочий пример
      # Временная директория для созданных .torrent-файлов (TorrentTaskService).
      - /host_mnt/d/Work/MyProjects/gametest/gameLibraryConfigs/tracker/torrents:/torrentDirTmp
      #- /host_mnt/f/Work/Git/my_project/data/tDir:/torrentDirTmp  #рабочий пример
      # Конфигурация скраперов (scrapers-config.json). Редактируется через админку или напрямую.
      - /host_mnt/d/Work/MyProjects/gametest/gameLibraryConfigs/scrapers:/scraper-config
      #- /host_mnt/f/Work/Git/my_project/data/tDir/scrapers:/scraper-config
    depends_on:
      postgresdb:
        condition: service_healthy
      transmission:
        condition: service_started
    restart: unless-stopped
    mem_limit: 1536m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: 64m

  transmission:
    image: lscr.io/linuxserver/transmission:4.1.2
    container_name: transmission
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    volumes:
      # Файлы игр, которые Transmission будет раздавать (та же директория, что и в GAMES_DIRECTORY).
      #- /host_mnt/f/Work/Git/my_project/data/games:/downloads/games
      - /host_mnt/d/Work/MyProjects/gametest/games:/downloads/games
      # Настройки Transmission (settings.json). После первого запуска файл создаётся автоматически.
      #- /host_mnt/f/Work/Git/my_project/data/gameLibraryConfigs/tracker/config:/config
      - /host_mnt/d/Work/MyProjects/gametest/gameLibraryConfigs/tracker/config:/config
      # Авто-добавление .torrent-файлов (положите .torrent → Transmission подхватит).
      #- /host_mnt/f/Work/Git/my_project/data/gameLibraryConfigs/tracker/watch:/watch
      - /host_mnt/d/Work/MyProjects/gametest/gameLibraryConfigs/tracker/watch:/watch
      # Завершённые загрузки.
      #- /host_mnt/f/Work/Git/my_project/data/gameLibraryConfigs/tracker/complete:/downloads/complete
      - /host_mnt/d/Work/MyProjects/gametest/gameLibraryConfigs/tracker/complete:/downloads/complete
      # Незавершённые загрузки (докачка).
      #- /host_mnt/f/Work/Git/my_project/data/gameLibraryConfigs/tracker/incomplete:/downloads/incomplete
      - /host_mnt/d/Work/MyProjects/gametest/gameLibraryConfigs/tracker/incomplete:/downloads/incomplete
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Etc/UTC
      - TRANSMISSION_DOWNLOAD_DIR=/downloads/complete
      - TRANSMISSION_INCOMPLETE_DIR=/downloads/incomplete
      - TRANSMISSION_INCOMPLETE_DIR_ENABLED=true
      - TRANSMISSION_WATCH_DIR=/watch
      - TRANSMISSION_WATCH_DIR_ENABLED=true
      - DHT=true
      - LPD=true
      - PEX=true
    mem_limit: 256m

    restart: unless-stopped
