version: '3'
services:
  postgresdb:
    build:
      context: .
      dockerfile: ./postgresdb/Dockerfile
    ports:
      - "5432:5432"
    volumes:
      - /host_mnt/d/Work/MyProjects/gametest/db/data:/var/lib/postgresql/data
      #- /host_mnt/f/Work/Git/my_project/db/data:/var/lib/postgresql/data  рабочий пример
    env_file:
      - ./postgresdb/env.list
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_HOST=postgresdb
      - DB_PORT=5432
      # ⚠️ TRACKER_ANNOUNCE_URL — IP машины, на которой запущен backend (трекер).
      # Должен быть доступен из ваших торрент-клиентов. Замените на актуальный IP:
      #   docker-compose:  http://<IP_ХОСТА>:8080/game-library/api/tracker/announce
      #   без Docker:      http://localhost:8080/game-library/api/tracker/announce
      - TRACKER_ANNOUNCE_URL=http://192.168.0.109:8080/game-library/api/tracker/announce
      - TRANSMISSION_RPC_URL=http://transmission:9091/transmission/rpc
      - TRANSMISSION_DOWNLOAD_DIR=/downloads
      - GAMES_DIRECTORY=/gameLibrary
      - IMAGES_DIRECTORY=/gameLibrary/images
      - JWT_SECRET=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    volumes:
      - /host_mnt/d/Work/MyProjects/gametest:/gameLibrary
      #- /host_mnt/f/Work/Git/my_project/data:/gameLibrary  рабочий пример
      - /host_mnt/d/Work/MyProjects/gametest/tracker/torrents:/torrentDirTmp
      #- /host_mnt/f/Work/Git/my_project/data/tDir:/torrentDirTmp  рабочий пример
    depends_on:
      postgresdb:
        condition: service_healthy
      transmission:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  transmission:
    image: lscr.io/linuxserver/transmission:4.1.2
    container_name: transmission
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    volumes:
      - /host_mnt/d/Work/MyProjects/gametest/games:/downloads/games
      - /host_mnt/d/Work/MyProjects/gametest/tracker/config:/config
      - /host_mnt/d/Work/MyProjects/gametest/tracker/watch:/watch
      - /host_mnt/d/Work/MyProjects/gametest/tracker/complete:/downloads/complete
      - /host_mnt/d/Work/MyProjects/gametest/tracker/incomplete:/downloads/incomplete
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Etc/UTC
      - TRANSMISSION_DOWNLOAD_DIR=/downloads/complete
      - TRANSMISSION_INCOMPLETE_DIR=/downloads/incomplete
      - TRANSMISSION_INCOMPLETE_DIR_ENABLED=true
      - TRANSMISSION_WATCH_DIR=/watch
      - TRANSMISSION_WATCH_DIR_ENABLED=true
      - DHT=true
      - LPD=true
      - PEX=true
    restart: unless-stopped
